<div class="container">
  <h2>Bienvenido</h2>
  <p class="subtitle" *ngIf="step === 1">Inicia sesión en tu cuenta</p>
  <p class="subtitle" *ngIf="step === 2">Verificación de Dos Factores</p>

  <div *ngIf="errorMessage" class="error-message" style="text-align: center; margin-bottom: 1rem;">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="login()" *ngIf="step === 1">
    <div class="form-group">
      <input type="text" id="username" name="username" [(ngModel)]="credentials.username" required placeholder=" ">
      <label for="username">Usuario</label>
    </div>

    <div class="form-group">
      <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required placeholder=" ">
      <label for="password">Contraseña</label>
    </div>

    <button type="submit">Siguiente</button>
  </form>

  <form (ngSubmit)="verify2fa()" *ngIf="step === 2">
    <div class="form-group">
      <input type="text" id="token" name="token" [(ngModel)]="twoFactorToken" required placeholder=" ">
      <label for="token">Código 2FA</label>
    </div>

    <button type="submit">Verificar y Entrar</button>
  </form>

  <div class="link-text" *ngIf="step === 1">
    ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
  </div>
</div>
