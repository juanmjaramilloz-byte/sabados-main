<div class="container" style="max-width: 900px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <h2>Reservas de vuelo</h2>
    <button (click)="goBack()" style="width: auto; padding: 0.5rem 1rem; margin: 0; background: var(--accent);">Volver</button>
  </div>

  <div *ngIf="errorMessage" class="error-message" style="margin-bottom: 1rem;">
    {{ errorMessage }}
  </div>

  <div *ngIf="reservations.length === 0 && !errorMessage">
    <p>No hay reservas registradas aún.</p>
  </div>

  <table *ngIf="reservations.length > 0" class="reservations-table">
    <thead>
      <tr>
        <th>Origen</th>
        <th>Destino</th>
        <th>Fecha Ida</th>
        <th>Fecha Vuelta</th>
        <th>Pasajeros</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let flight of reservations">
        <td>{{ flight.origin }}</td>
        <td>{{ flight.destination }}</td>
        <td>{{ flight.departure_date }}</td>
        <td>{{ flight.return_date }}</td>
        <td>{{ flight.passengers }}</td>
      </tr>
    </tbody>
  </table>
</div>
